[workspace]
name = "streaming_timeseries"
description = "Streaming display of multichannel timeseries data."
authors = ["droumis"]
version = "2024-12-06"
channels = ["conda-forge", "nodefaults"]
platforms = ["linux-64", "osx-64", "win-64", "osx-arm64"]

[dependencies]
notebook = ">=6.5.2"
python = "3.11.*"
numpy = ">=2.1.3"
panel = ">=1.4.2"
hvplot = ">=0.10.0"
pandas = ">=2.2.1"
holoviews = ">=1.19.0"
h5py = ">=3.12.1"
mne-lsl = ">=1.8.0"
jupyterlab = ">=4.3.2"
pyproj = "==3.6.1"
bokeh = ">=3.6.2"
pip = "*"

[pypi-dependencies]
tsdownsample = ">=0.1.3"
mne = { version = ">=1.8.0", extras = ["hdf5"] }
h5io = "*"
pymatreader = "*"
xmltodict = "*"

[tasks.lab]
cmd = "jupyter lab streaming_timeseries.ipynb"
depends-on = ["download"]

[tasks.notebook]
cmd = "jupyter notebook streaming_timeseries.ipynb"
depends-on = ["download"]

[tasks.dashboard]
cmd = "panel serve --rest-session-info --session-history -1 streaming_timeseries.ipynb --show"
depends-on = ["download"]

[tasks.download]
cmd = "mkdir -p data && curl -fsSL -o data/sample-ant-raw.fif https://datasets.holoviz.org/eeg_ant/v1/sample-ant-raw.fif"
outputs = ["data/sample-ant-raw.fif"]
