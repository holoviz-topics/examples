[workspace]
name = "bay_trimesh"
description = "Visualizing water depth into the Chesapeake and Delaware Bays"
authors = ["philippjfr"]
version = "2019-05-15"
channels = ["https://repo.anaconda.com/pkgs/main", "https://repo.anaconda.com/pkgs/r", "https://repo.anaconda.com/pkgs/msys2"]
platforms = ["linux-64", "osx-64", "win-64", "osx-arm64"]

[dependencies]
python = "3.8.*"
notebook = "<7"
colorcet = "*"
datashader = "0.13.0.*"
geoviews = "1.9.1.*"
holoviews = "1.14.6.*"
pandas = "<1.4"
bokeh = "2.3.3.*"
dask = "2021.10.0.*"
param = "1.11.1.*"
numpy = "<1.21"
numba = "<0.55"
jinja2 = "<3"
markupSafe = "2.0.1.*"
pip = "*"
wheel = "*"

[target.osx-64.dependencies]
libgfortran = "*"

[target.osx-arm64.dependencies]
libgfortran = "*"

[tasks.notebook]
cmd = "jupyter notebook bay_trimesh.ipynb"
depends-on = ["download"]

[tasks.download]
cmd = "mkdir -p . && curl -fsSL -o ./.DATA.zip https://s3.amazonaws.com/datashader-data/Chesapeake_and_Delaware_Bays.zip && unzip -o ./.DATA.zip -d . && rm ./.DATA.zip"
outputs = ["data"]
