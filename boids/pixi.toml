[workspace]
name = "boids"
description = "Boids models of swarm intelligence using HoloViews"
authors = ["jlstevens"]
version = "2015-01-01"
channels = ["https://repo.anaconda.com/pkgs/main", "https://repo.anaconda.com/pkgs/r", "https://repo.anaconda.com/pkgs/msys2"]
platforms = ["linux-64", "win-64", "osx-64", "osx-arm64"]

[dependencies]
python = "3.9.*"
notebook = "6.5.2.*"
bokeh = "2.4.3.*"
holoviews = "1.15.3.*"
numpy = "1.22.*"
pandas = "<1.5"
pip = "*"
wheel = "*"

[target.osx-arm64.dependencies]
libgfortran = "*"

[tasks]
notebook = "jupyter notebook boids.ipynb"
