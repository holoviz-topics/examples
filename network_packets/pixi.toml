[workspace]
name = "network_packets"
description = "Graphing network packets using networkx, holoviews, and datashader"
authors = ["jbcrail", "jbednar"]
version = "2017-07-24"
channels = ["https://repo.anaconda.com/pkgs/main", "https://repo.anaconda.com/pkgs/r", "https://repo.anaconda.com/pkgs/msys2"]
platforms = ["linux-64", "osx-64", "win-64", "osx-arm64"]

[dependencies]
python = "3.9.*"
notebook = "*"
bokeh = "2.3.3.*"
colorcet = "*"
dask = "2021.9.1.*"
datashader = "0.13.0.*"
fastparquet = "0.5.0.*"
holoviews = "1.14.5.*"
networkx = "*"
scikit-image = "*"
python-snappy = "0.6.0.*"
pandas = "*"
param = "1.11.1.*"
numpy = "1.21.*"
numba = "0.55.*"
panel = "0.12.1.*"
jinja2 = "<3"
markupsafe = "2.0.1.*"
pyviz_comms = "2.0.2.*"
scipy = "1.9.*"
pip = "*"
wheel = "*"

[target.osx-64.dependencies]
libgfortran = "*"

[target.osx-arm64.dependencies]
libgfortran = "*"

[tasks.notebook]
cmd = "jupyter notebook network_packets.ipynb"
depends-on = ["download"]

[tasks.prepare_data]
cmd = "python pcap_to_parquet.py maccdc2012_00000.txt"
depends-on = ["download"]

[tasks.download]
cmd = "mkdir -p . && curl -fsSL -o ./.DATA.zip http://s3.amazonaws.com/datashader-data/maccdc2012_graph.zip && unzip -o ./.DATA.zip -d . && rm ./.DATA.zip"
outputs = ["data"]
