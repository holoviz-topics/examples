[workspace]
name = "ship_traffic"
description = "Visualizing AIS location tracking data for marine vessels near the USA"
authors = ["jbednar", "jlstevens"]
version = "2021-01-27"
channels = ["https://repo.anaconda.com/pkgs/main", "https://repo.anaconda.com/pkgs/r", "https://repo.anaconda.com/pkgs/msys2"]
platforms = ["linux-64", "osx-64", "win-64", "osx-arm64"]

[dependencies]
python = "3.9.*"
bokeh = "*"
colorcet = "*"
dask = "*"
datashader = "*"
holoviews = "*"
notebook = "*"
numba = "*"
numexpr = "*"
pandas = "*"
panel = "*"
spatialpandas = "*"
xarray = "*"
pyarrow = "*"
pip = "*"
setuptools = "*"
wheel = "*"

[target.osx-64.dependencies]
libgfortran = "*"

[target.osx-arm64.dependencies]
libgfortran = "*"

[tasks.dashboard]
cmd = "panel serve --rest-session-info --session-history -1 ship_traffic.ipynb"
depends-on = ["download"]

[tasks.notebook]
cmd = "jupyter notebook ship_traffic.ipynb"
depends-on = ["download"]

[tasks.download]
cmd = "mkdir -p data && curl -fsSL -o data/.DATA.zip http://s3.amazonaws.com/datashader-data/ship_traffic.zip && unzip -o data/.DATA.zip -d data && rm data/.DATA.zip"
outputs = ["data/AIS_2020_01_broadcast.parq"]
