[workspace]
name = "sri_model"
description = "Agent based modelling in epidemiology using HoloViews"
authors = ["philippjfr"]
version = "2015-01-01"
channels = ["https://repo.anaconda.com/pkgs/main", "https://repo.anaconda.com/pkgs/r", "https://repo.anaconda.com/pkgs/msys2"]
platforms = ["linux-64", "osx-64", "win-64", "osx-arm64"]

[dependencies]
python = "3.9.*"
notebook = "*"
scipy = "*"
holoviews = "*"
matplotlib = "*"
networkx = "*"
numpy = "*"
pandas = "*"
param = "*"
pip = "*"
setuptools = "*"
wheel = "*"

[target.osx-64.dependencies]
libgfortran = "*"

[target.osx-arm64.dependencies]
libgfortran = "*"

[tasks]
notebook = "jupyter notebook sri_model.ipynb"
