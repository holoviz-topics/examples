[workspace]
name = "euler"
description = "Panel dashboard illustrating Euler's Method"
channels = ["https://repo.anaconda.com/pkgs/main", "https://repo.anaconda.com/pkgs/r", "https://repo.anaconda.com/pkgs/msys2"]
platforms = ["linux-64", "osx-64", "win-64", "osx-arm64"]

[dependencies]
python = "3.10.*"
notebook = "<7"
holoviews = "*"
numpy = "*"
pandas = "*"
panel = "*"
param = "*"
pip = "*"
setuptools = "*"
wheel = "*"

[target.osx-arm64.dependencies]
libgfortran = "*"

[tasks]
dashboard = "panel serve --rest-session-info --session-history -1 euler.ipynb --show"
notebook = "jupyter notebook euler.ipynb"
