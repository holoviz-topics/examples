[workspace]
name = "gapminders"
description = "Using four different plotting libraries for the Hans Rosling gapminder example"
authors = ["philippjfr"]
version = "2018-01-01"
channels = ["https://repo.anaconda.com/pkgs/main", "https://repo.anaconda.com/pkgs/r", "https://repo.anaconda.com/pkgs/msys2"]
platforms = ["linux-64", "osx-64", "win-64", "osx-arm64"]

[dependencies]
python = "3.11.*"
notebook = "<7"
plotly = ">=5.19.0"
holoviews = ">=1.18.3"
hvplot = ">=0.9.2"
panel = ">=1.4.2"
param = ">=2.1.0"
bokeh = ">=3.4.0"
altair = ">=5.0.1"
pandas = ">=2.2.1"
pip = "*"
setuptools = "*"
wheel = "*"

[target.osx-arm64.dependencies]
libgfortran = "*"

[tasks.dashboard]
cmd = "panel serve --rest-session-info --session-history -1 gapminders.ipynb --show"
depends-on = ["download"]

[tasks.notebook]
cmd = "jupyter notebook gapminders.ipynb"
depends-on = ["download"]

[tasks.download]
cmd = "mkdir -p data && curl -fsSL -o data/gapminders.csv https://raw.githubusercontent.com/plotly/datasets/5169d70627202f62d6ac983641541c76d26db861/gapminderDataFiveYear.csv"
outputs = ["data/gapminders.csv"]
