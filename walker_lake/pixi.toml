[workspace]
name = "walker_lake"
description = "Analysis of NDVI over time of Walker Lake, Nevada"
authors = ["jlstevens", "jbednar"]
version = "2018-10-11"
channels = ["conda-forge", "nodefaults"]
platforms = ["linux-64", "osx-64", "win-64", "osx-arm64"]

[dependencies]
python = "3.11.*"
notebook = ">=6,<7"
datashader = ">=0.16.3"
geoviews = ">=1.13.1"
holoviews = ">=1.20.0"
rioxarray = ">=0.17.0"
dask = ">=2024.11.2"
distributed = ">=2024.11.2"
pip = "*"
wheel = "*"

[tasks.notebook]
cmd = "jupyter notebook walker_lake.ipynb"
depends-on = ["download-LANDSAT8_B4", "download-LANDSAT8_B5", "download-LANDSAT5_B4", "download-LANDSAT5_B5"]

[tasks.download-LANDSAT8_B4]
cmd = "mkdir -p data && curl -fsSL -o data/LC08_L1TP_042033_20171022_20171107_01_T1_sr_band4.tif https://earth-data.s3.us-east-1.amazonaws.com/landsat/LC08_L1TP_042033_20171022_20171107_01_T1_sr_band4.tif"
outputs = ["data/LC08_L1TP_042033_20171022_20171107_01_T1_sr_band4.tif"]

[tasks.download-LANDSAT8_B5]
cmd = "mkdir -p data && curl -fsSL -o data/LC08_L1TP_042033_20171022_20171107_01_T1_sr_band5.tif https://earth-data.s3.us-east-1.amazonaws.com/landsat/LC08_L1TP_042033_20171022_20171107_01_T1_sr_band5.tif"
outputs = ["data/LC08_L1TP_042033_20171022_20171107_01_T1_sr_band5.tif"]

[tasks.download-LANDSAT5_B4]
cmd = "mkdir -p data && curl -fsSL -o data/LT05_L1TP_042033_19881022_20161001_01_T1_sr_band4.tif https://earth-data.s3.us-east-1.amazonaws.com/landsat/LT05_L1TP_042033_19881022_20161001_01_T1_sr_band4.tif"
outputs = ["data/LT05_L1TP_042033_19881022_20161001_01_T1_sr_band4.tif"]

[tasks.download-LANDSAT5_B5]
cmd = "mkdir -p data && curl -fsSL -o data/LT05_L1TP_042033_19881022_20161001_01_T1_sr_band5.tif https://earth-data.s3.us-east-1.amazonaws.com/landsat/LT05_L1TP_042033_19881022_20161001_01_T1_sr_band5.tif"
outputs = ["data/LT05_L1TP_042033_19881022_20161001_01_T1_sr_band5.tif"]
